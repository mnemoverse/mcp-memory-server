# Smithery metadata for @mnemoverse/mcp-memory-server
# Published via: smithery mcp publish <url> -n @mnemoverse/mcp-memory-server
# Do NOT publish directly — coordinate with Sprint #6 mcp-memory-server#1.

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        description: "Your Mnemoverse API key (starts with mk_live_). Get one free at https://console.mnemoverse.com"
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@mnemoverse/mcp-memory-server@latest"],
      env: {
        MNEMOVERSE_API_KEY: config.apiKey,
      },
    })

description: "Store and recall long-term memory for AI agents. Persistent memory across Claude, Cursor, ChatGPT — semantic search retrieves the right context across sessions, projects, and tools."
